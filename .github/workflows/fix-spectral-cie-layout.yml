name: Fix Spectral Optimizer CIE Layout

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-spectral-cie-layout.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add responsive CIE layout fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('spectral_optimizer/styles.css')
          text = path.read_text(encoding='utf-8')
          marker = '/* === CIE ASPECT-RATIO FIX === */'
          if marker not in text:
              text += r'''

/* === CIE ASPECT-RATIO FIX === */
.visualization-area,
.charts-row,
.spd-panel,
.cie-panel {
    min-width: 0;
}

.charts-row {
    display: grid;
    grid-template-columns: minmax(0, 1.65fr) minmax(300px, 1fr);
    gap: 18px;
    align-items: start;
}

.spd-panel,
.cie-panel {
    overflow: hidden;
}

.canvas-wrapper {
    width: 100%;
    min-width: 0;
}

#cie-canvas-wrapper {
    width: 100%;
    aspect-ratio: 1 / 1;
    height: auto;
    max-height: none;
}

#spd-canvas,
#cie-canvas {
    display: block;
    width: 100%;
    height: 100%;
}

@media (max-width: 1180px) {
    .charts-row {
        grid-template-columns: 1fr;
    }

    .cie-panel {
        width: min(100%, 680px);
        justify-self: center;
    }
}

@media (max-width: 720px) {
    #cie-canvas-wrapper {
        aspect-ratio: 1 / 1;
    }
}
'''
              path.write_text(text, encoding='utf-8')
          PY

      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet -- spectral_optimizer/styles.css; then
            echo "Layout fix already present."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spectral_optimizer/styles.css
          git commit -m "Fix spectral optimizer CIE canvas aspect ratio"
          git push
