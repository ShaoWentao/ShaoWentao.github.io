name: Sync WeChat Articles

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone WeChat scraper
        run: git clone --depth 1 https://github.com/xianyu564/scrape-my-wechat-official-account.git wechat-scraper

      - name: Install scraper dependencies
        run: pip install -r wechat-scraper/requirements.txt

      - name: Create scraper config
        env:
          WECHAT_COOKIE: ${{ secrets.WECHAT_COOKIE }}
          WECHAT_TOKEN: ${{ secrets.WECHAT_TOKEN }}
          WECHAT_ACCOUNT_NAME: ${{ secrets.WECHAT_ACCOUNT_NAME }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          cookie = os.environ.get("WECHAT_COOKIE", "").strip()
          token = os.environ.get("WECHAT_TOKEN", "").strip()
          if not cookie or not token:
              raise SystemExit("Missing WECHAT_COOKIE or WECHAT_TOKEN secrets.")

          config = {
              "COOKIE": cookie,
              "TOKEN": token,
              "WECHAT_ACCOUNT_NAME": os.environ.get("WECHAT_ACCOUNT_NAME") or "瓶子先森Light",
              "COUNT": os.environ.get("WECHAT_COUNT", "20"),
              "SLEEP_LIST": os.environ.get("WECHAT_SLEEP_LIST", "2.5"),
              "SLEEP_ART": os.environ.get("WECHAT_SLEEP_ART", "1.5"),
              "IMG_SLEEP": os.environ.get("WECHAT_IMG_SLEEP", "0.08"),
          }
          Path("wechat-scraper/env.json").write_text(
              json.dumps(config, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Fetch WeChat articles
        run: |
          cd wechat-scraper/script
          python wx_publish_backup.py

      - name: Copy article archive
        run: |
          BACKUP_DIR="$(find wechat-scraper -type d -name 'Wechat-Backup' | head -n 1)"
          if [ -z "$BACKUP_DIR" ]; then
            echo "Wechat-Backup folder was not generated."
            exit 1
          fi
          mkdir -p wechat-articles
          rsync -a --delete "$BACKUP_DIR"/ wechat-articles/

      - name: Build homepage article data
        env:
          WECHAT_ACCOUNT_NAME: ${{ secrets.WECHAT_ACCOUNT_NAME }}
        run: |
          python scripts/build_wechat_posts.py \
            --backup wechat-articles \
            --output assets/data/wechat-posts.json \
            --account "${WECHAT_ACCOUNT_NAME:-瓶子先森Light}" \
            --site-prefix wechat-articles \
            --limit 6

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add assets/data/wechat-posts.json wechat-articles/
          git diff --staged --quiet || git commit -m "Sync WeChat articles"
          git push
